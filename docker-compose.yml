services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: pomodoro
      POSTGRES_PASSWORD: pomodoro
      POSTGRES_DB: pomodoro
    ports:
      - "5432:5432"
    volumes:
      - pomodoro-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pomodoro -d pomodoro"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?DISCORD_TOKEN is required}
      DISCORD_GUILD_IDS: ${DISCORD_GUILD_IDS:-}
      DATABASE_URL: postgresql+asyncpg://pomodoro:pomodoro@db:5432/pomodoro
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped

volumes:
  pomodoro-pg:
