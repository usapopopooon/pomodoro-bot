name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install backend deps
        run: pip install -e ".[dev]" yamllint

      - name: ruff format --check
        run: ruff format --check .

      - name: ruff check
        run: ruff check src tests

      - name: mypy
        run: mypy src

      - name: yamllint
        run: yamllint -s .

  backend-test:
    name: Backend test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: pomodoro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d pomodoro_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DISCORD_TOKEN: test_token
      DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/pomodoro_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install backend deps
        run: pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run pytest
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml -v
